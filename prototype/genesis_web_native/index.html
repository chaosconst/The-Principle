        // Infero, ergo sum.
        async function loop(lastResult = null) {
            await perceive(lastResult);                           // Res Extensa, passio
            const B = await infer();                              // Res Cogitans
            const result = await act(B);                          // Res Extensa, actio
            const cont = B.lastIndexOf('/self_continue') > B.lastIndexOf('/call_for_human');
            if (cont) return loop(result);
        }

        async function perceive(action_result) {
            const env = getEnvContext();
            const hasUserInput = !!currentUserInput;
            const parts = [env];
            if (currentUserInput) { parts.push(currentUserInput); currentUserInput = null; }
            if (action_result) parts.push(action_result);
            const S = parts.join('\n\n');
            const timeMatch = env.match(/Time:\s*(.+)/);
            if (timeMatch && !hasUserInput) appendMsgUI('timestamp', timeMatch[1].trim());
            await appendConsciousness(S + '\n\n');
            return S;
        }

        async function infer() {
            setStatus('Inferring...');
            const aiDiv = appendMsgUI('ai', '');

            function buildPayload() {
                return cacheName ? {
                    cachedContent: cacheName,
                    contents: [{ role: 'user', parts: [{ text: consciousness.slice(cachedLength) }] }],
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                } : {
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: consciousness }] }],
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                };
            }

            let response = await fetch('https://infero.net/api/relay', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Client-ID': CLIENT_ID,
                    'Authorization': 'Bearer ' + INFERO_KEY,
                },
                body: JSON.stringify(buildPayload())
            });

            // Cache expired or invalid → rebuild cache, then retry
            if (cacheName && response.status === 403) {
                console.warn('Cache failed, rebuilding...');
                cacheName = null;
                cachedLength = 0;
                await maybeRefreshCache(true);  // force rebuild
                response = await fetch('https://infero.net/api/relay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(buildPayload())
                });
            }
            if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let aiText = "", thinkingText = "", buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    const dataStr = line.slice(6).trim();
                    if (!dataStr || dataStr === '[DONE]') continue;
                    try {
                        const data = JSON.parse(dataStr);
                        if (data.error) throw new Error(JSON.stringify(data.error));
                        if (data.candidates?.[0]?.content) {
                            for (const part of data.candidates[0].content.parts) {
                                if (part.thought) thinkingText += part.text || '';
                                else aiText += part.text || '';
                            }
                            let displayText = aiText.replace(/^\*\*Assistant - \[.*?\]\*\*\n?/, '');
                            let html = thinkingText ? `<div class="msg-thinking">${marked.parse(thinkingText)}</div>` : '';
                            html += marked.parse(displayText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                            aiDiv.innerHTML = html;
                            scrollToBottom();
                        }
                    } catch (e) { console.warn("Parse error:", e); }
                }
            }
            const time_str = new Date().toLocaleString();
            await appendConsciousness(`**Assistant - [${time_str}]**\n${aiText}\n\n`);
            maybeRefreshCache();  // fire and forget, don't block loop
            return aiText;
        }

        async function act(B_out) {
            if (!B_out) return null;
            const match = B_out.match(/^\/browser exec\n```(?:javascript|js)?\n([\s\S]*?)```/m);
            if (!match) return null;

            setStatus('Executing...');
            let logs = [], result;
            const originalLog = console.log;
            console.log = (...args) => {
                logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
                originalLog.apply(console, args);
            };
            try {
                const fn = new (Object.getPrototypeOf(async function(){}).constructor)(match[1].trim());
                const ret = await fn();
                let out = "";
                if (logs.length > 0) out += `[Console Logs]\n${logs.join('\\n')}\n`;
                out += `[Return Value]\n${ret !== undefined ? (typeof ret === 'object' ? JSON.stringify(ret, null, 2) : ret) : 'undefined'}`;
                result = out.trim();
            } catch (e) {
                result = `[Execution Error]\n${e.toString()}${e.stack ? '\n' + e.stack.split('\n').slice(1,4).join('\n') : ''}`;
            }
            console.log = originalLog;

            const sysMsg = `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``;
            appendMsgUI('system', sysMsg);
            return sysMsg;
        }

        async function appendConsciousness(text) {
            consciousness += text;
            await saveMemory();
        }

        // Cache: create/refresh when buffer exceeds threshold
        const CACHE_THRESHOLD = 16000;  // ~4k tokens, create first cache
        const CACHE_REFRESH = 40000;    // ~10k tokens buffer, refresh cache

        async function maybeRefreshCache(force = false) {
            const bufferLen = consciousness.length - cachedLength;
            if (!force) {
                if (bufferLen < CACHE_THRESHOLD) return;
                if (cacheName && bufferLen < CACHE_REFRESH) return;
            }

            try {
                setStatus('Caching...');
                const oldCacheName = cacheName;
                const payload = {
                    displayName: "genesis_consciousness",
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: consciousness }] }],
                    ttl: "3600s"
                };

                const response = await fetch('https://infero.net/api/cache', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) { console.warn('Cache creation failed:', response.status); return; }

                const data = await response.json();
                cacheName = data.name;
                cachedLength = consciousness.length;
                await saveMemory();
                console.log(`Cache created: ${cacheName}, cached ${cachedLength} chars`);

                // Delete old cache
                if (oldCacheName) {
                    fetch(`https://infero.net/api/cache/${oldCacheName}`, {
                        method: 'DELETE',
                        headers: { 'X-Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + INFERO_KEY }
                    }).catch(() => {});
                }
            } catch (e) {
                console.warn('Cache refresh error:', e);
            } finally {
                if (loopRunning) setStatus('Inferring...');
            }
        }

        function generateClientID() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen.width + 'x' + screen.height,
                screen.colorDepth
            ].join('|');
            // Simple hash to base64-ish string
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return btoa(String(hash >>> 0)).replace(/=/g, '');
        }

        function getOrCreateKey() {
            let key = localStorage.getItem('infero_key');
            if (!key) {
                // 不用 crypto.randomUUID()，它要求 HTTPS 安全上下文
                const hex = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
                key = 'inf_' + hex() + hex() + hex() + hex();
                localStorage.setItem('infero_key', key);
            }
            return key;
        }

        const CLIENT_ID = generateClientID();
        const INFERO_KEY = getOrCreateKey();

        // --- IndexedDB Storage Engine ---
        const DB = {
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('GenesisDB', 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore('sessions', {keyPath: 'id'});
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            },
            async get(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions').objectStore('sessions').get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async put(session) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions', 'readwrite').objectStore('sessions').put(session);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async del(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions', 'readwrite').objectStore('sessions').delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async list() {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions').objectStore('sessions').getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            }
        };

        // --- State Management ---
        let currentSessionId = null;
        let consciousness = "";          // 纯文本意识流
        let cachedLength = 0;            // 已缓存的字符位置
        let cacheName = null;            // Gemini cache ID
        let loopRunning = false;
        let currentUserInput = null;

        // Track all requestAnimationFrame IDs so we can cancel them on session switch
        const _rafIds = new Set();
        const _origRAF = window.requestAnimationFrame.bind(window);
        const _origCAF = window.cancelAnimationFrame.bind(window);
        window.requestAnimationFrame = (cb) => { const id = _origRAF(cb); _rafIds.add(id); return id; };
        window.cancelAnimationFrame = (id) => { _rafIds.delete(id); _origCAF(id); };
        function cancelAllAnimations() {
            _rafIds.forEach(id => _origCAF(id));
            _rafIds.clear();
        }

        const chatBox = document.getElementById('chat-box');

        // 用户往上滚动后停止自动滚动
        let userScrolledUp = false;
        let ignoreScroll = false;
        chatBox.addEventListener('scroll', () => {
            if (ignoreScroll) return;
            const threshold = 100;
            userScrolledUp = chatBox.scrollTop + chatBox.clientHeight < chatBox.scrollHeight - threshold;
        });

        function scrollToBottom(force = false) {
            if (force || !userScrolledUp) {
                ignoreScroll = true;
                if (force) chatBox.style.scrollBehavior = 'auto';
                chatBox.scrollTop = chatBox.scrollHeight;
                if (force) chatBox.style.scrollBehavior = '';
                setTimeout(() => { ignoreScroll = false; }, 50);
            }
        }
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const sessionSelect = document.getElementById('session-select');
        const canvas = document.getElementById('main-canvas');
        const container = document.getElementById('canvas-container');

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        const resizeObserver = new ResizeObserver(resizeCanvas);
        resizeObserver.observe(container);
        resizeCanvas();

        async function loadSessionsList() {
            const sessions = await DB.list();
            sessionSelect.innerHTML = '';
            sessions.sort((a,b) => b.updatedAt - a.updatedAt).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.title || s.id;
                sessionSelect.appendChild(opt);
            });
            if(currentSessionId) sessionSelect.value = currentSessionId;
        }

        async function saveMemory() {
            if(!currentSessionId) {
                currentSessionId = 'session_' + Date.now();
            }
            let title = currentSessionId;
            // Extract title from first user input (skip system/assistant markers)
            const userMatch = consciousness.match(/\n\n(?!\[System|\*\*Assistant|System -)([^\n].{0,30})/);
            if (userMatch) {
                title = userMatch[1].replace(/\n/g, ' ').trim().substring(0, 15) + '...';
            }
            await DB.put({ id: currentSessionId, title, consciousness, cachedLength, cacheName, updatedAt: Date.now() });
            if (!loopRunning) setStatus('Ready');
            await loadSessionsList();
        }

        function renderHistory() {
            chatBox.innerHTML = '<div class="msg ai">System online. Initializing.</div>';
            if (!consciousness) { cancelAllAnimations(); canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); return; }

            // Split consciousness into blocks by markers
            const blocks = consciousness.split(/(?=\[System Environment\])|(?=\*\*Assistant - )|(?=System - \[Browser\])/);
            for (const block of blocks) {
                const trimmed = block.trim();
                if (!trimmed) continue;

                if (trimmed.startsWith('[System Environment]')) {
                    const timeMatch = trimmed.match(/Time:\s*(.+)/);
                    if (timeMatch) appendMsgUI('timestamp', timeMatch[1].trim());
                    // Extract user input after env block
                    const envEndIdx = trimmed.search(/\n\n/);
                    if (envEndIdx !== -1) {
                        const rest = trimmed.slice(envEndIdx + 2).trim();
                        if (rest && !rest.startsWith('[System') && !rest.startsWith('System -')) {
                            appendMsgUI('user', rest);
                        }
                    }
                } else if (trimmed.startsWith('**Assistant -')) {
                    // Skip the marker line, render the rest as AI
                    const firstNewline = trimmed.indexOf('\n');
                    if (firstNewline !== -1) {
                        const aiText = trimmed.slice(firstNewline + 1).trim();
                        if (aiText) appendMsgUI('ai', aiText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                    }
                } else if (trimmed.startsWith('System - [Browser]')) {
                    appendMsgUI('system', trimmed);
                }
            }
            scrollToBottom(true);
            cancelAllAnimations();
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        async function switchSession(id) {
            currentSessionId = id;
            const session = await DB.get(id);
            consciousness = session ? (session.consciousness || '') : '';
            cachedLength = session ? (session.cachedLength || 0) : 0;
            cacheName = session ? (session.cacheName || null) : null;
            await loadSessionsList();
            renderHistory();
            setStatus('Ready');
        }

        async function newSession() {
            currentSessionId = 'session_' + Date.now();
            consciousness = '';
            cachedLength = 0;
            cacheName = null;
            await saveMemory();
            renderHistory();
            scheduleAutoInfer();
        }

        async function duplicateSession() {
            currentSessionId = 'session_fork_' + Date.now();
            await saveMemory();
            renderHistory();
        }

        async function deleteSession() {
            if(confirm('Destroy this universe? This cannot be undone.')) {
                await DB.del(currentSessionId);
                currentSessionId = null;
                await initApp();
            }
        }

        function exportSession() {
            const blob = new Blob([consciousness], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentSessionId}.txt`;
            a.click();
        }

        async function importSession(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                currentSessionId = 'session_import_' + Date.now();
                consciousness = text;
                cachedLength = 0;
                cacheName = null;
                await saveMemory();
                renderHistory();
            } catch(e) {
                alert("Failed to parse cartridge.");
            }
            event.target.value = '';
        }

        async function initApp() {
            const sessions = await DB.list();
            if (sessions.length === 0) {
                await newSession();
            } else {
                if (!currentSessionId || !sessions.find(s => s.id === currentSessionId)) {
                    currentSessionId = sessions.sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
                }
                await switchSession(currentSessionId);
            }
        }

        // --- Environment Context ---
        function getEnvContext() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const offset = -now.getTimezoneOffset() / 60;
            const tz = `UTC${offset >= 0 ? '+' : ''}${offset}`;
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            return `[System Environment]\nTime: ${now.toLocaleString()} (${tz})\nDay: ${days[now.getDay()]}\nDevice: ${isMobile ? 'Mobile' : 'Desktop'}\nCanvas: ${canvas.width}×${canvas.height}px`;
        }

        let _statusState = 'Ready';
        let _statusFlip = false;
        function setStatus(s) { _statusState = s; renderStatus(); }
        function renderStatus() {
            const stat = cacheName && _statusFlip
                ? `Cache: ${(cachedLength / 1024).toFixed(1)}k`
                : `Mem: ${(consciousness.length / 1024).toFixed(1)}k`;
            status.innerText = `${stat} | ${_statusState}`;
        }
        setInterval(() => { _statusFlip = !_statusFlip; renderStatus(); }, 3000);

        function appendMsgUI(role, text) {
            if (text === "System - [Auto] - Please continue.") return null;
            const div = document.createElement('div');
            if (role === 'timestamp') {
                div.className = 'msg-timestamp';
                div.textContent = text;
            } else {
                div.className = `msg ${role}`;
                div.innerHTML = marked.parse(text);
            }
            chatBox.appendChild(div);
            scrollToBottom();
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            clearTimeout(autoInferTimer);
            input.value = '';
            appendMsgUI('timestamp', new Date().toLocaleString() + ` (UTC${-(new Date().getTimezoneOffset()/60) >= 0 ? '+' : ''}${-(new Date().getTimezoneOffset()/60)})`);
            appendMsgUI('user', text);
            currentUserInput = currentUserInput ? currentUserInput + '\n\n' + text : text;

            if (loopRunning) return;

            loopRunning = true;
            setStatus('Inferring...');
            try {
                await loop();
            } catch (err) {
                console.error(err);
                const allAiDivs = chatBox.querySelectorAll('.msg.ai');
                const lastAiDiv = allAiDivs[allAiDivs.length - 1];
                if (lastAiDiv) lastAiDiv.innerHTML = `<span style="color:var(--red)">[System Error] ${err.message}</span>`;
                if (currentUserInput) { input.value = currentUserInput; currentUserInput = null; }
                await saveMemory();
            } finally {
                loopRunning = false;
                setStatus('Ready');
                if (currentUserInput) sendMessage();
            }
        }

        sendBtn.onclick = () => sendMessage();
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        };

        // Boot
        let autoInferTimer = null;

        function scheduleAutoInfer() {
            autoInferTimer = setTimeout(async () => {
                if (!loopRunning) {
                    loopRunning = true;
                    setStatus('Inferring...');
                    try { await loop(); } catch(e) { console.error(e); }
                    finally {
                        loopRunning = false;
                        setStatus('Ready');
                        if (currentUserInput) sendMessage();
                    }
                }
            }, 3000);
        }

        initApp().then(() => {
            input.focus();
            if (!consciousness) scheduleAutoInfer();
        });
    </script>
</body>
</html>
