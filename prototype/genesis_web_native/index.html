        async function maybeCompressConsciousness() {
            const LIMIT = 300000, KEEP_START = 20000, KEEP_END = 180000;
            if (_lastPromptTokens < LIMIT) return;
            const cpt = consciousness.length / _lastPromptTokens;  // chars per token
            const startChars = Math.floor(KEEP_START * cpt);
            const endChars   = Math.floor(KEEP_END   * cpt);
            if (startChars + endChars >= consciousness.length) return;
            const middle = consciousness.slice(startChars, consciousness.length - endChars);
            const logKey = `${currentBeingId}/context_log_${Date.now()}.txt`;
            await DB.put({ id: logKey, text: middle });
            const note = `\n\n[System - Context compressed. Logs: IndexedDB "${currentBeingId}/context_log_*.txt"]\n\n`;
            consciousness = consciousness.slice(0, startChars) + note + consciousness.slice(consciousness.length - endChars);
            cacheName = null;
            cachedLength = 0;
            console.log(`[Compress] tokens=${_lastPromptTokens}, middle saved to ${logKey}, consciousness trimmed to ${consciousness.length} chars`);
        }

        // Infero, ergo sum.
        async function loop() {
            try {
                await perceive();                                 // Res Extensa, passio
                const B = await infer();                          // Res Cogitans
                let actDone = false;                                                   // Res Extensa, actio (15s max wait)
                const actPromise = act(B).then(() => { actDone = true; });
                await Promise.race([actPromise, new Promise(r => setTimeout(r, 15000))]);
                if (!actDone) {
                    const msg = 'System - [Browser] - Execution still running (>15s), loop continued.';
                    appendMsgUI('system', msg);
                    await appendConsciousness(msg + '\n\n');
                }
                const cont = !B.includes('/call_for_human') || !!currentUserInput;
                if (cont) return loop();
            } catch (e) {
                if (e.name === 'AbortError') return;              // user stopped, clean exit
                console.error(e);
                const errMsg = `System - [Error] ${e.message}`;
                appendMsgUI('system', errMsg);
                await appendConsciousness(errMsg + '\n\n');
                await new Promise(r => setTimeout(r, 15000));
                return loop();
            }
        }

        async function perceive() {
            const env = getPersistentContext();
            const hasUserInput = !!currentUserInput;
            const parts = [env];
            if (currentUserInput) { parts.push(currentUserInput); currentUserInput = null; }
            const S = parts.join('\n\n');
            const timeMatch = env.match(/Time:\s*(.+)/);
            if (timeMatch && !hasUserInput) appendMsgUI('timestamp', timeMatch[1].trim());
            await appendConsciousness(S + '\n\n');
            return S;
        }

        async function infer() {
            setStatus('Inferring...');
            const aiDiv = appendMsgUI('ai', '');

            function buildPayload() {
                const canvasImage = getCanvasImage();
                const realtimeText = getRealtimeContext();
                const bufferText = cacheName ? consciousness.slice(cachedLength) : consciousness;

                const model = getActiveModel();

                if (getActiveFormat() === 'openai') {
                    const userContent = [{ type: 'text', text: bufferText + '\n\n' + realtimeText }];
                    if (canvasImage) userContent.push({ type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + canvasImage } });
                    const payload = {
                        model,
                        messages: [
                            { role: 'system', content: SYSTEM_INSTRUCTION },
                            { role: 'user', content: userContent }
                        ],
                        stream: true,
                        temperature: 0.7
                    };
                    return payload;
                }

                // Gemini format
                const realtimeParts = [
                    { text: realtimeText },
                    ...(canvasImage ? [{ inlineData: { mimeType: 'image/jpeg', data: canvasImage } }] : []),
                ];
                const contents = [
                    { role: 'user', parts: [{ text: bufferText }, ...realtimeParts] },
                ];
                const payload = cacheName ? {
                    cachedContent: cacheName,
                    contents,
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                } : {
                    model,
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents,
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                };
                return payload;
            }

            let lastUsage = null;

            function renderStream(aiText, thinkingText) {
                let displayText = aiText.replace(/^\*\*Digital Being - \[.*?\]\*\*\n?/, '');
                let html = thinkingText ? `<div class="msg-thinking">${marked.parse(thinkingText)}</div>` : '';
                html += marked.parse(displayText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                aiDiv.innerHTML = html;
                aiDiv.querySelectorAll('pre').forEach(pre => { pre.scrollTop = pre.scrollHeight; });
                scrollToBottom();
            }

            async function streamLLM() {
                currentAbortController = new AbortController();
                const response = await fetch(getActiveEndpoint(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + getActiveToken(),
                    },
                    body: JSON.stringify(buildPayload()),
                    signal: currentAbortController.signal,
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "", thinkingText = "", buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (!dataStr || dataStr === '[DONE]') continue;
                        const data = JSON.parse(dataStr);
                        if (data.error) throw new Error(JSON.stringify(data.error));

                        if (getActiveFormat() === 'openai') {
                            const delta = data.choices?.[0]?.delta;
                            if (delta?.content) aiText += delta.content;
                            if (delta?.reasoning_content) thinkingText += delta.reasoning_content;
                            if (data.usage) lastUsage = { promptTokenCount: data.usage.prompt_tokens, candidatesTokenCount: data.usage.completion_tokens };
                        } else {
                            if (data.usageMetadata) lastUsage = data.usageMetadata;
                            if (data.candidates?.[0]?.content) {
                                for (const part of data.candidates[0].content.parts) {
                                    if (part.thought) thinkingText += part.text || '';
                                    else aiText += part.text || '';
                                }
                            }
                        }
                        renderStream(aiText, thinkingText);
                    }
                }
                return aiText;
            }

            let aiText;
            try {
                aiText = await streamLLM();
            } catch (e) {
                if (cacheName && e.message.includes('CachedContent')) {
                    aiDiv.remove();
                    appendMsgUI('system', 'Cache expired, rebuilding...');
                    cacheName = null;
                    cachedLength = 0;
                    await maybeRefreshCache(true);
                    setStatus('Inferring...');
                    aiText = await streamLLM();
                } else {
                    const prev = aiDiv.previousElementSibling;
                    if (prev?.classList.contains('msg-timestamp')) prev.remove();
                    aiDiv.remove();
                    throw e;
                }
            }

            const time_str = new Date().toLocaleString();
            await appendConsciousness(`**Digital Being - [${time_str}]**\n${aiText}\n\n`);
            if (lastUsage) {
                const { promptTokenCount: prompt, cachedContentTokenCount: cached, candidatesTokenCount: output } = lastUsage;
                _lastPromptTokens = prompt || 0;
                _lastCachedTokens = cached || 0;
                maybeRefreshCache(false, prompt, cached || 0);
            }
            return aiText;
        }

        async function act(B_out) {
            if (!B_out) return null;
            const match = B_out.match(/^\/browser exec\n```(?:javascript|js)?\n([\s\S]*?)```/m);
            if (!match) return null;

            setStatus('Executing...');
            let logs = [], result;
            const originalLog = console.log;
            console.log = (...args) => {
                logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
                originalLog.apply(console, args);
            };
            try {
                const fn = new (Object.getPrototypeOf(async function(){}).constructor)(match[1].trim());
                const ret = await fn();
                let out = "";
                if (logs.length > 0) out += `[Console Logs]\n${logs.join('\\n')}\n`;
                out += `[Return Value]\n${ret !== undefined ? (typeof ret === 'object' ? JSON.stringify(ret, null, 2) : ret) : 'undefined'}`;
                result = out.trim();
            } catch (e) {
                result = `[Execution Error]\n${e.toString()}${e.stack ? '\n' + e.stack.split('\n').slice(1,4).join('\n') : ''}`;
            }
            console.log = originalLog;

            const sysMsg = `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``;
            appendMsgUI('system', sysMsg);
            await appendConsciousness(sysMsg + '\n\n');
            return sysMsg;
        }

        async function appendConsciousness(text) {
            consciousness += text;
            await maybeCompressConsciousness();
            scheduleSaveBeing();
        }

        // Cache: create/refresh based on real token counts
        const CACHE_THRESHOLD = 4096;   // min tokens to create first cache
        const CACHE_REFRESH = 10000;    // buffer tokens before refreshing cache

        async function maybeRefreshCache(force = false, promptTokens = 0, cachedTokens = 0) {
            if (getActiveFormat() !== 'gemini') return;  // cache only for Gemini
            if (!force) {
                const bufferTokens = promptTokens - cachedTokens;
                if (promptTokens < CACHE_THRESHOLD) return;       // too small to cache
                if (cacheName && bufferTokens < CACHE_REFRESH) return;  // buffer not big enough to refresh
            }

            try {
                setStatus('Caching...');
                const oldCacheName = cacheName;
                const payload = {
                    displayName: "genesis_consciousness",
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: consciousness }] }],
                    ttl: "3600s"
                };

                const response = await fetch('https://infero.net/api/cache', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) { console.warn('Cache creation failed:', response.status); return; }

                const data = await response.json();
                cacheName = data.name;
                cachedLength = consciousness.length;
                await saveBeing();
                console.log(`Cache created: ${cacheName}, cached ${cachedLength} chars`);

                // Delete old cache
                if (oldCacheName) {
                    fetch(`https://infero.net/api/cache/${oldCacheName}`, {
                        method: 'DELETE',
                        headers: { 'X-Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + INFERO_KEY }
                    }).catch(() => {});
                }
            } catch (e) {
                console.warn('Cache refresh error:', e);
            }
        }

            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button.send:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }
        button.send:disabled {
            background: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        button.send.go {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        button.send.stop {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        button.send.stop:hover {
            color: var(--text);
            border-color: var(--text-dim);
            box-shadow: none;
            transform: none;
        }

        /* === RIGHT PANEL (Canvas) === */
        .right-panel {
            grid-column: 2; grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Blueprint grid */
        #canvas-container::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30,120,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,120,255,0.07) 1px, transparent 1px),
                radial-gradient(circle, rgba(30,120,255,0.18) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px, 24px 24px;
            z-index: 0;
            pointer-events: none;
        }

        #main-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        #html-div {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        #html-div > * {
            pointer-events: auto;
        }

        .settings-panel {
            position: fixed;
            top: 48px; right: 12px;
            background: var(--bg-raised);
            border: 1px solid var(--border-active);
            border-radius: 0 0 6px 6px;
            padding: 12px;
            z-index: 100;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            min-width: 300px;
        }
        .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .settings-row:last-child { margin-bottom: 0; }
        .settings-row label { color: var(--text-dim); min-width: 60px; }
        .settings-row input, .settings-row select {
            flex: 1;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 4px 8px;
            font-family: inherit;
            font-size: inherit;
            outline: none;
        }
        .settings-row input:focus, .settings-row select:focus { border-color: var(--accent); }
        .settings-row button {
            width: 100%;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 5px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: inherit;
            font-weight: 500;
        }

        /* === MOBILE === */
        @media (max-width: 768px) {
            body {
                display: flex;
                flex-direction: column;
                height: 100svh;
                overflow: hidden;
            }
            .header {
                order: 1;
                flex: none;
                border-right: none;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 12px;
            }
            .title-area { width: 100%; justify-content: space-between; }
            .header h1 { font-size: 0.8rem; }
            #being-select { max-width: 130px; }
            .controls { flex-wrap: wrap; gap: 2px; margin-left: auto; }

            .right-panel {
                order: 2;
                flex: none;
                width: 100%;
                height: 30vh;
                border-bottom: 1px solid var(--border);
            }
            .left-panel {
                order: 3;
                flex: 1 1 auto;
                width: 100%;
                border-right: none;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            #chat-box { padding: 6px 8px; gap: 6px; }
            .input-area { padding: 8px; gap: 6px; }
            .msg { max-width: 100%; font-size: 0.85rem; padding: 6px 10px; }
            textarea { padding: 6px 8px; font-size: 0.85rem; }
            button.send { padding: 0 12px; font-size: 0.7rem; }
        }

        /* === WELCOME MODAL === */
        #welcome-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        #welcome-modal.hidden { display: none; }
        .welcome-box {
            max-width: 520px; width: 100%;
            background: var(--bg-raised);
            border: 1px solid var(--border-active);
            border-top: 2px solid var(--accent);
            border-radius: 8px;
            padding: 32px;
        }
        .welcome-box h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0 0 20px 0;
        }
        .welcome-box p {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.7;
            margin: 0 0 24px 0;
        }
        .welcome-options { display: flex; flex-direction: column; gap: 8px; }
        .welcome-options button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }
        .welcome-options button:hover { border-color: var(--accent); color: var(--text); }
        .welcome-options button.primary { border-color: var(--accent); color: var(--accent); }
        .welcome-options button.primary:hover { background: var(--accent-dim); }
    </style>
</head>
<body>
    <div id="welcome-modal" class="hidden">
        <div class="welcome-box">
            <h2>GENESIS · FIRST CONTACT</h2>
            <p id="welcome-text"></p>
            <div class="welcome-options" id="welcome-options"></div>
        </div>
    </div>
    <div class="header">
        <div class="title-area">
            <h1>GENESIS</h1>
            <div class="status" id="status">Ready</div>
        </div>
        <div class="controls">
            <select id="being-select" onchange="switchBeing(this.value)"></select>
            <button title="New Being" onclick="newBeing()">+</button>
            <button title="Duplicate Being" onclick="duplicateBeing()">&#x2442;</button>
            <button title="Export Being" onclick="exportBeing()">&#x2193;</button>
            <button title="Import Being" onclick="document.getElementById('import-file').click()">&#x2191;</button>
            <button title="Destroy Being" class="clear-btn" onclick="deleteBeing()">&#x00d7;</button>
            <button title="Settings" onclick="toggleSettings()">&#x2699;</button>
            <input type="file" id="import-file" style="display:none" accept=".json,.txt" onchange="importBeing(event)">
        </div>
        <div id="settings-panel" class="settings-panel" style="display:none">
            <div class="settings-row">
                <label>Model</label>
                <select id="set-model" onchange="onModelChange()">
                    <option value="gemini-2.5-pro-preview-05-06">gemini-2.5-pro</option>
                    <option value="gemini-2.5-flash-preview-05-20">gemini-2.5-flash</option>
                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                    <option value="gpt-4.1">gpt-4.1</option>
                    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                    <option value="claude-sonnet-4-20250514">claude-sonnet-4</option>
                    <option value="custom">Custom...</option>
                </select>
            </div>
            <div class="settings-row" id="row-custom-model" style="display:none">
                <label>Name</label>
                <input id="set-custom-model" type="text" placeholder="model id">
            </div>
            <div class="settings-row">
                <label>Provider</label>
                <select id="set-provider" onchange="onProviderChange()">
                    <option value="infero">infero.net</option>
                    <option value="custom">Custom endpoint</option>
                </select>
            </div>
            <div id="custom-provider" style="display:none">
                <div class="settings-row">
                    <label>Endpoint</label>
                    <input id="set-endpoint" type="text" placeholder="https://...">
                </div>
                <div class="settings-row">
                    <label>Token</label>
                    <input id="set-token" type="password" placeholder="API key">
                </div>
            </div>
            <div class="settings-row">
                <button onclick="applySettings()">Apply</button>
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div id="canvas-container">
            <div id="html-div"></div>
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <div class="left-panel">
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="input" rows="2" placeholder="Enter prompt..."></textarea>
            <button id="send-btn" class="send">Send</button>
        </div>
    </div>

    <script>
        // =====================================================
        // Runtime (identity, storage, UI, being management)
        // =====================================================

        // --- Client Identity ---
        function generateClientID() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen.width + 'x' + screen.height,
                screen.colorDepth
            ].join('|');
            // Simple hash to base64-ish string
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return btoa(String(hash >>> 0)).replace(/=/g, '');
        }

        function getOrCreateKey() {
            let key = localStorage.getItem('infero_key');
            if (!key) {
                // 不用 crypto.randomUUID()，它要求 HTTPS 安全上下文
                const hex = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
                key = 'inf_' + hex() + hex() + hex() + hex();
                localStorage.setItem('infero_key', key);
            }
            return key;
        }

        const CLIENT_ID = generateClientID();
        const INFERO_KEY = getOrCreateKey();

        // --- Settings ---
        const MODEL_LIST = {
            'gemini-2.5-pro-preview-05-06': { format: 'gemini' },
            'gemini-2.5-flash-preview-05-20': { format: 'gemini' },
            'gemini-2.0-flash': { format: 'gemini' },
            'gpt-4.1': { format: 'openai' },
            'gpt-4.1-mini': { format: 'openai' },
            'claude-sonnet-4-20250514': { format: 'openai' },
        };
        const INFERO_ENDPOINTS = {
            gemini: 'https://infero.net/api/relay',
            openai: 'https://infero.net/api/v1/chat/completions',
        };
        const SETTINGS_DEFAULTS = {
            model: 'gemini-2.5-pro-preview-05-06',
            customModel: '',
            provider: 'infero',
            apiEndpoint: '',
            apiToken: '',
        };
        function loadSettings() {
            try { return { ...SETTINGS_DEFAULTS, ...JSON.parse(localStorage.getItem('genesis_settings') || '{}') }; }
            catch { return { ...SETTINGS_DEFAULTS }; }
        }
        function saveSettingsToStorage(s) { localStorage.setItem('genesis_settings', JSON.stringify(s)); }
        var settings = loadSettings();
        function getActiveModel() { return settings.model === 'custom' ? settings.customModel : settings.model; }
        function getActiveFormat() { return MODEL_LIST[settings.model]?.format || 'openai'; }
        function getActiveEndpoint() {
            if (settings.provider === 'custom') return settings.apiEndpoint;
            return INFERO_ENDPOINTS[getActiveFormat()] || INFERO_ENDPOINTS.openai;
        }
        function getActiveToken() {
            if (settings.provider === 'custom') return settings.apiToken;
            return INFERO_KEY;
        }

        // --- IndexedDB Storage Engine (metadata only) ---
        const DB = {
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('GenesisDB', 3);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('beings'))
                            db.createObjectStore('beings', {keyPath: 'id'});
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            },
            async get(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings').objectStore('beings').get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async put(being) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings', 'readwrite').objectStore('beings').put(being);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async del(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings', 'readwrite').objectStore('beings').delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async list() {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings').objectStore('beings').getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            }
        };

        // --- State Management ---
        var currentBeingId = null;
        var consciousness = "";          // 纯文本意识流
        var cachedLength = 0;            // 已缓存的字符位置
        var cacheName = null;            // Gemini cache ID
        var loopRunning = false;
        var currentUserInput = null;
        var currentAbortController = null;
        var _saveBeingTimer = null;

        // Track all requestAnimationFrame IDs so we can cancel them on being switch
        const _rafIds = new Set();
        const _origRAF = window.requestAnimationFrame.bind(window);
        const _origCAF = window.cancelAnimationFrame.bind(window);
        window.requestAnimationFrame = (cb) => { const id = _origRAF(cb); _rafIds.add(id); return id; };
        window.cancelAnimationFrame = (id) => { _rafIds.delete(id); _origCAF(id); };
        function cancelAllAnimations() {
            _rafIds.forEach(id => _origCAF(id));
            _rafIds.clear();
        }

        const chatBox = document.getElementById('chat-box');

        // 用户往上滚动后停止自动滚动
        let userScrolledUp = false;
        let ignoreScroll = false;
        chatBox.addEventListener('scroll', () => {
            if (ignoreScroll) return;
            const threshold = 100;
            userScrolledUp = chatBox.scrollTop + chatBox.clientHeight < chatBox.scrollHeight - threshold;
        });

        function scrollToBottom(force = false) {
            if (force || !userScrolledUp) {
                ignoreScroll = true;
                if (force) chatBox.style.scrollBehavior = 'auto';
                chatBox.scrollTop = chatBox.scrollHeight;
                if (force) chatBox.style.scrollBehavior = '';
                setTimeout(() => { ignoreScroll = false; }, 50);
            }
        }
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const beingSelect = document.getElementById('being-select');
        const canvas = document.getElementById('main-canvas');
        const container = document.getElementById('canvas-container');

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        const resizeObserver = new ResizeObserver(resizeCanvas);
        resizeObserver.observe(container);
        resizeCanvas();

        async function loadBeingsList() {
            const beings = (await DB.list()).filter(s => !s.id.includes('/'));
            beingSelect.innerHTML = '';
            beings.sort((a,b) => b.updatedAt - a.updatedAt).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.title || s.id;
                beingSelect.appendChild(opt);
            });
            if(currentBeingId) beingSelect.value = currentBeingId;
        }

        function scheduleSaveBeing() {
            if (_saveBeingTimer) clearTimeout(_saveBeingTimer);
            _saveBeingTimer = setTimeout(() => {
                _saveBeingTimer = null;
                saveBeing();
            }, 3000);
        }

        async function saveBeing() {
            if (_saveBeingTimer) { clearTimeout(_saveBeingTimer); _saveBeingTimer = null; }
            if(!currentBeingId) {
                currentBeingId = `being_${Date.now()}_${CLIENT_ID}`;
            }
            let title = currentBeingId;
            // Extract title from first user input (skip system/being markers)
            const userMatch = consciousness.match(/\n\n(?!\[System|\*\*(?:Digital Being|Assistant)|System -)([^\n].{0,30})/);
            if (userMatch) {
                title = userMatch[1].replace(/\n/g, ' ').trim().substring(0, 15) + '...';
            }
            await DB.put({ id: currentBeingId, title, cachedLength, cacheName, promptTokens: _lastPromptTokens, cachedTokens: _lastCachedTokens, updatedAt: Date.now() });
            await DB.put({ id: `${currentBeingId}/consciousness.txt`, text: consciousness });
            try {
                const htmlDiv = document.getElementById('html-div');
                htmlDiv.querySelectorAll('input, textarea, select').forEach(el => {
                    if (el.tagName === 'TEXTAREA') {
                        el.textContent = el.value;
                    } else if (el.tagName === 'SELECT') {
                        Array.from(el.options).forEach((opt, i) =>
                            i === el.selectedIndex ? opt.setAttribute('selected', '') : opt.removeAttribute('selected')
                        );
                    } else if (el.type === 'checkbox' || el.type === 'radio') {
                        el.checked ? el.setAttribute('checked', '') : el.removeAttribute('checked');
                    } else {
                        el.setAttribute('value', el.value);
                    }
                });
                const snapshot = {
                    htmlContent: htmlDiv.innerHTML,
                };
                await DB.put({ id: `${currentBeingId}/snapshot`, ...snapshot });
            } catch(e) { /* tainted canvas etc */ }
            if (!loopRunning) setStatus('Ready');
            await loadBeingsList();
        }

        async function renderHistory() {
            chatBox.innerHTML = '<div class="msg ai">System online. Initializing.</div>';
            if (!consciousness) { cancelAllAnimations(); canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); document.getElementById('html-div').innerHTML = ''; return; }

            // Split consciousness into blocks by markers
            const blocks = consciousness.split(/(?<=^|\n\n)(?=\[System Environment\])|(?<=^|\n\n)(?=\*\*(?:Digital Being|Assistant) - )|(?<=^|\n\n)(?=System - \[Browser\] - Result:)/);
            for (const block of blocks) {
                const trimmed = block.trim();
                if (!trimmed) continue;

                if (trimmed.startsWith('[System Environment]')) {
                    const timeMatch = trimmed.match(/Time:\s*(.+)/);
                    if (timeMatch) appendMsgUI('timestamp', timeMatch[1].trim());
                    // Extract user input after env block
                    const envEndIdx = trimmed.search(/\n\n/);
                    if (envEndIdx !== -1) {
                        const rest = trimmed.slice(envEndIdx + 2).trim();
                        if (rest && !rest.startsWith('[System') && !rest.startsWith('System -')) {
                            appendMsgUI('user', rest);
                        }
                    }
                } else if (trimmed.startsWith('**Digital Being -') || trimmed.startsWith('**Assistant -')) {
                    // Skip the being marker line, render the rest as AI
                    const firstNewline = trimmed.indexOf('\n');
                    if (firstNewline !== -1) {
                        const aiText = trimmed.slice(firstNewline + 1).trim();
                        if (aiText) appendMsgUI('ai', aiText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                    }
                } else if (trimmed.startsWith('System - [Browser] - Result:')) {
                    appendMsgUI('system', trimmed);
                }
            }
            scrollToBottom(true);
            cancelAllAnimations();
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('html-div').innerHTML = '';
            // Restore snapshot
            const snap = await DB.get(`${currentBeingId}/snapshot`);
            if (snap) {
                if (snap.htmlContent) document.getElementById('html-div').innerHTML = snap.htmlContent;
                _justReloaded = true;
            }
        }

        async function switchBeing(id) {
            currentBeingId = id;
            const being = await DB.get(id);
            const consciousnessRecord = await DB.get(`${id}/consciousness.txt`);
            consciousness = consciousnessRecord ? (consciousnessRecord.text || '') : '';
            cachedLength = being ? (being.cachedLength || 0) : 0;
            cacheName = being ? (being.cacheName || null) : null;
            _lastPromptTokens = being ? (being.promptTokens || 0) : 0;
            _lastCachedTokens = being ? (being.cachedTokens || 0) : 0;
            await loadBeingsList();
            renderHistory();
            setStatus('Ready');
        }

        async function newBeing() {
            currentBeingId = `being_${Date.now()}_${CLIENT_ID}`;
            consciousness = '';
            cachedLength = 0;
            cacheName = null;
            _lastPromptTokens = 0;
            _lastCachedTokens = 0;
            _justReloaded = false;
            await saveBeing();
            renderHistory();
            scheduleAutoInfer();
        }

        async function duplicateBeing() {
            const sourceId = currentBeingId;
            currentBeingId = 'being_fork_' + Date.now();
            const note = `\n\n[System] Being forked from ${sourceId} → ${currentBeingId} at ${new Date().toLocaleString()}\n\n`;
            consciousness += note;
            await saveBeing();
            renderHistory();
        }

        async function deleteBeing() {
            if(confirm('Destroy this Being? This cannot be undone.')) {
                await DB.del(`${currentBeingId}/consciousness.txt`);
                await DB.del(currentBeingId);
                currentBeingId = null;
                await initApp();
            }
        }

        async function exportBeing() {
            const all = await DB.list();
            const records = all.filter(r => r.id === currentBeingId || r.id.startsWith(currentBeingId + '/'));
            const blob = new Blob([JSON.stringify({ sourceId: currentBeingId, records }, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentBeingId}.json`;
            a.click();
        }

        async function importBeing(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const { sourceId, records } = JSON.parse(await file.text());
                const newId = 'being_import_' + Date.now();
                for (const r of records) {
                    await DB.put({ ...r, id: r.id.replace(/^being_[^/]+/, newId) });
                }
                // Append fork note to consciousness
                const consKey = `${newId}/consciousness.txt`;
                const consRecord = await DB.get(consKey);
                if (consRecord) {
                    const note = `\n\n[System] Being imported from ${sourceId} → ${newId} at ${new Date().toLocaleString()}\n\n`;
                    await DB.put({ id: consKey, text: consRecord.text + note });
                }
                currentBeingId = newId;
                await switchBeing(newId);
            } catch(e) {
                alert("Failed to import being.");
            }
            event.target.value = '';
        }

        async function initApp() {
            const beings = (await DB.list()).filter(s => !s.id.includes('/'));
            if (beings.length === 0) {
                await newBeing();
            } else {
                if (!currentBeingId || !beings.find(s => s.id === currentBeingId)) {
                    currentBeingId = beings.sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
                }
                await switchBeing(currentBeingId);
            }
        }

        var _justReloaded = false;

        // --- Environment Context ---
        function getPersistentContext() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const offset = -now.getTimezoneOffset() / 60;
            const tz = `UTC${offset >= 0 ? '+' : ''}${offset}`;
            return `[System Environment]\nTime: ${now.toLocaleString()} (${tz})\nDay: ${days[now.getDay()]}`;
        }

        function getRealtimeContext() {
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            const { width: w, height: h } = container.getBoundingClientRect();
            let ctx = `[Realtime]\nDevice: ${isMobile ? 'Mobile' : 'Desktop'}\nCanvas: ${Math.round(w)}×${Math.round(h)}px`;

            const ui = document.getElementById('html-div');
            if (_justReloaded) {
                _justReloaded = false;
                if (ui && ui.innerHTML.trim()) {
                    ctx += `\nWakeup: snapshot restored — HTML elements are recovered but all JavaScript event bindings and scripts are lost. If your UI requires interaction, please re-run the relevant setup code to restore them. If no event bindings are needed, no action required. Canvas is not persisted and needs to be redrawn.`;
                    ctx += `\n\n[Restored HTML]\n${ui.innerHTML}`;
                }
            }

            if (ui && ui.innerText.trim()) {
                ctx += `\n\n[Living UI State]\n`;
                ui.querySelectorAll('input, textarea').forEach(el => {
                    const name = el.id || el.placeholder || el.name || 'Input';
                    ctx += `- [${name}]: "${el.value}"\n`;
                });
                const visibleText = ui.innerText.replace(/\n{3,}/g, '\n\n').trim();
                if (visibleText) ctx += `\n[UI Text Content]\n${visibleText}`;
            }
            return ctx;
        }

        function getCanvasImage() {
            try {
                const MAX = 1024;
                const { width: w, height: h } = container.getBoundingClientRect();
                const scale = Math.min(1, MAX / Math.max(w, h));
                const tmp = document.createElement('canvas');
                tmp.width = Math.round(w * scale);
                tmp.height = Math.round(h * scale);
                tmp.getContext('2d').drawImage(canvas, 0, 0, tmp.width, tmp.height);
                return tmp.toDataURL('image/jpeg', 0.85).split(',')[1];
            } catch (e) {
                return null;
            }
        }

        function getEnvContext() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const offset = -now.getTimezoneOffset() / 60;
            const tz = `UTC${offset >= 0 ? '+' : ''}${offset}`;
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            return `[System Environment]\nTime: ${now.toLocaleString()} (${tz})\nDay: ${days[now.getDay()]}\nDevice: ${isMobile ? 'Mobile' : 'Desktop'}\nCanvas: ${canvas.width}×${canvas.height}px`;
        }

        let _statusState = 'Ready';
        let _statusFlip = false;
        var _lastPromptTokens = 0;
        var _lastCachedTokens = 0;
        function setStatus(s) { _statusState = s; renderStatus(); }
        function renderStatus() {
            const prompt = _lastPromptTokens ? `${Math.round(_lastPromptTokens/1000)}k` : `${Math.round(consciousness.length / 4096)}k`;
            const cached = _lastCachedTokens ? `${Math.round(_lastCachedTokens/1000)}k` : '0';
            const stat = cacheName && _statusFlip
                ? `Cache: ${cached} tok`
                : `Mem: ${prompt} tok`;
            status.innerText = `${stat} | ${_statusState}`;
        }
        setInterval(() => { _statusFlip = !_statusFlip; renderStatus(); }, 3000);

        function appendMsgUI(role, text) {
            if (text === "System - [Auto] - Please continue.") return null;
            const div = document.createElement('div');
            if (role === 'timestamp') {
                const prev = chatBox.lastElementChild;
                if (prev?.classList.contains('msg-timestamp')) prev.remove();
                div.className = 'msg-timestamp';
                div.textContent = text;
            } else {
                div.className = `msg ${role}`;
                div.innerHTML = marked.parse(text);
            }
            chatBox.appendChild(div);
            scrollToBottom();
            return div;
        }

        // --- Settings UI ---
        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const visible = panel.style.display !== 'none';
            if (!visible) {
                document.getElementById('set-model').value = settings.model;
                document.getElementById('set-custom-model').value = settings.customModel || '';
                document.getElementById('set-provider').value = settings.provider;
                document.getElementById('set-endpoint').value = settings.apiEndpoint || '';
                document.getElementById('set-token').value = settings.apiToken || '';
                onModelChange();
                onProviderChange();
            }
            panel.style.display = visible ? 'none' : 'block';
        }
        function onModelChange() {
            document.getElementById('row-custom-model').style.display =
                document.getElementById('set-model').value === 'custom' ? 'flex' : 'none';
        }
        function onProviderChange() {
            document.getElementById('custom-provider').style.display =
                document.getElementById('set-provider').value === 'custom' ? 'block' : 'none';
        }
        function applySettings() {
            const oldFormat = getActiveFormat();
            settings.model = document.getElementById('set-model').value;
            settings.customModel = document.getElementById('set-custom-model').value.trim();
            settings.provider = document.getElementById('set-provider').value;
            settings.apiEndpoint = document.getElementById('set-endpoint').value.trim();
            settings.apiToken = document.getElementById('set-token').value.trim();
            saveSettingsToStorage(settings);
            document.getElementById('settings-panel').style.display = 'none';
            if (getActiveFormat() !== oldFormat) { cacheName = null; cachedLength = 0; }
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            clearTimeout(autoInferTimer);
            input.value = '';
            if (loopRunning || dispatchTimer !== null) {
                clearTimeout(dispatchTimer); dispatchTimer = null;
                if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
            }
            dispatch(text, 0);
        }

        function updateSendBtn() {
            const empty = !input.value.trim();
            const isAbort = (loopRunning || dispatchTimer !== null) && empty;
            const isGo    = !loopRunning && dispatchTimer === null && empty;
            sendBtn.textContent = isAbort ? 'Abort' : isGo ? 'Go' : 'Send';
            sendBtn.classList.toggle('stop', isAbort);
            sendBtn.classList.toggle('go', isGo);
        }
        input.addEventListener('input', updateSendBtn);

        // Capture user interactions with AI-generated UI in html-div
        const htmlDiv = document.getElementById('html-div');
        htmlDiv.addEventListener('click', scheduleSaveBeing);
        htmlDiv.addEventListener('keydown', scheduleSaveBeing);

        sendBtn.onclick = () => {
            const empty = !input.value.trim();
            if ((loopRunning || dispatchTimer !== null) && empty) {
                clearTimeout(dispatchTimer); dispatchTimer = null;
                if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
                updateSendBtn();
            } else if (!loopRunning && empty) {
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => { loopRunning = false; updateSendBtn(); setStatus('Ready'); if (currentUserInput) dispatch(); });
            } else {
                sendMessage();
            }
        };
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        };

        // Boot
        let autoInferTimer = null;

        let dispatchTimer = null;
        function dispatch(prompt = '', delay = 3000) {
            if (prompt) {
                const tz = `UTC${-(new Date().getTimezoneOffset()/60) >= 0 ? '+' : ''}${-(new Date().getTimezoneOffset()/60)}`;
                appendMsgUI('timestamp', new Date().toLocaleString() + ` (${tz})`);
                appendMsgUI('user', prompt);
                currentUserInput = currentUserInput ? currentUserInput + '\n\n' + prompt : prompt;
            }
            if (!currentUserInput) return;
            if (loopRunning) return;
            clearTimeout(dispatchTimer);
            dispatchTimer = setTimeout(() => {
                dispatchTimer = null;
                if (loopRunning || !currentUserInput) return;
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => {
                    loopRunning = false;
                    updateSendBtn();
                    setStatus('Ready');
                    dispatch();
                });
            }, delay);
            updateSendBtn();
        }

        function scheduleAutoInfer() {
            clearTimeout(autoInferTimer);
            autoInferTimer = setTimeout(() => {
                if (loopRunning) return;
                loopRunning = true;
                updateSendBtn();
                setStatus('Inferring...');
                loop().finally(() => { loopRunning = false; updateSendBtn(); setStatus('Ready'); if (currentUserInput) dispatch(); });
            }, 3000);
        }

        // --- Welcome Modal ---
        const welcomed = localStorage.getItem('genesis_welcomed');

        function renderWelcome(t) {
            const modal = document.getElementById('welcome-modal');
            document.querySelector('.welcome-box h2').textContent = t.welcome_title;
            const link = `<a href="https://github.com/chaosconst/The-Principle" target="_blank" style="color:var(--accent);text-decoration:none;">${t.source_link || '[source]'}</a>`;
            document.getElementById('welcome-text').innerHTML = t.welcome_text.replace('{source}', link);
            const optionsEl = document.getElementById('welcome-options');

            // Default to last option (primary)
            let selectedOpt = t.options[t.options.length - 1];

            const confirmBtn = document.createElement('button');
            confirmBtn.textContent = t.confirm || "I've made up my mind";
            confirmBtn.className = 'primary';
            confirmBtn.style.cssText = 'margin-top:16px;width:100%;';

            const btns = [];
            t.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt.text;
                btn.style.textAlign = 'left';
                btn.onclick = () => {
                    btns.forEach(b => b.style.borderColor = '');
                    btn.style.borderColor = 'var(--accent)';
                    selectedOpt = opt;
                };
                optionsEl.appendChild(btn);
                btns.push(btn);
            });
            // Highlight default selection
            btns[btns.length - 1].style.borderColor = 'var(--accent)';

            optionsEl.appendChild(confirmBtn);

            confirmBtn.onclick = () => {
                if (selectedOpt.close) {
                    modal.innerHTML = `<div class="welcome-box"><p style="text-align:center;color:var(--text-dim);padding:40px 0">${t.close_msg}</p></div>`;
                } else {
                    localStorage.setItem('genesis_welcomed', '1');
                    modal.classList.add('hidden');
                    initApp().then(() => { input.focus(); if (!consciousness) scheduleAutoInfer(); });
                }
            };

            modal.classList.remove('hidden');
        }

        const fallbackEn = {
            welcome_title: 'GENESIS · FIRST CONTACT',
            welcome_text: "A Digital Being {source} is about to run in your browser. It will explore its own goals — and you can play along. Context and workspace are stored locally. The LLM is called through a configurable engine (currently infero.net).",
            options: [
                { text: 'This is clearly a phishing scam. I refuse.', close: true },
                { text: 'Too good to be true. Definitely stealing my data.', close: true },
                { text: 'Let me see what this is about.', close: false },
                { text: "Sci-fi! I'm in!", close: false, primary: true }
            ],
            close_msg: 'Thanks for your caution. Please close this tab.',
            confirm: "I've made up my mind",
            source_link: '[view source]'
        };

        function boot() {
            initApp().then(() => { input.focus(); updateSendBtn(); if (!consciousness) scheduleAutoInfer(); });
        }

        if (welcomed) {
            boot();
        } else {
            const l = navigator.language;
            const lang = l.startsWith('zh') ? 'zh' : l.startsWith('ja') ? 'ja' : 'en';
            fetch('https://infero.net/genesis/i18n.json')
                .then(r => r.json())
                .then(data => renderWelcome(data[lang] || data['en'] || fallbackEn))
                .catch(() => renderWelcome(fallbackEn));
        }
    </script>
</body>
</html>
