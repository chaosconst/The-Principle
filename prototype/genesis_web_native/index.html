        // Infero, ergo sum.
        async function loop(lastResult = null) {
            try {
                await perceive(lastResult);                       // Res Extensa, passio
                const B = await infer();                          // Res Cogitans
                const result = await act(B);                      // Res Extensa, actio
                const cont = B.lastIndexOf('/self_continue') > B.lastIndexOf('/call_for_human');
                if (cont) return loop(result);
            } catch (e) {
                console.error(e);
                const errMsg = `System - [Error] ${e.message}`;
                appendMsgUI('system', errMsg);
                await appendConsciousness(errMsg + '\n\n');
                await new Promise(r => setTimeout(r, 15000));
                return loop();
            }
        }

        async function perceive(action_result) {
            const env = getEnvContext();
            const hasUserInput = !!currentUserInput;
            const parts = [env];
            if (currentUserInput) { parts.push(currentUserInput); currentUserInput = null; }
            if (action_result) parts.push(action_result);
            const S = parts.join('\n\n');
            const timeMatch = env.match(/Time:\s*(.+)/);
            if (timeMatch && !hasUserInput) appendMsgUI('timestamp', timeMatch[1].trim());
            await appendConsciousness(S + '\n\n');
            return S;
        }

        async function infer() {
            setStatus('Inferring...');
            const aiDiv = appendMsgUI('ai', '');

            function buildPayload() {
                return cacheName ? {
                    cachedContent: cacheName,
                    contents: [{ role: 'user', parts: [{ text: consciousness.slice(cachedLength) }] }],
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                } : {
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: consciousness }] }],
                    generationConfig: { temperature: 0.7, thinkingConfig: { includeThoughts: true } }
                };
            }

            let lastUsage = null;

            async function streamLLM() {
                const response = await fetch('https://infero.net/api/relay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(buildPayload())
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "", thinkingText = "", buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();
                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6).trim();
                        if (!dataStr || dataStr === '[DONE]') continue;
                        const data = JSON.parse(dataStr);
                        if (data.error) throw new Error(JSON.stringify(data.error));
                        if (data.usageMetadata) lastUsage = data.usageMetadata;
                        if (data.candidates?.[0]?.content) {
                            for (const part of data.candidates[0].content.parts) {
                                if (part.thought) thinkingText += part.text || '';
                                else aiText += part.text || '';
                            }
                            let displayText = aiText.replace(/^\*\*Assistant - \[.*?\]\*\*\n?/, '');
                            let html = thinkingText ? `<div class="msg-thinking">${marked.parse(thinkingText)}</div>` : '';
                            html += marked.parse(displayText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                            aiDiv.innerHTML = html;
                            scrollToBottom();
                        }
                    }
                }
                return aiText;
            }

            let aiText;
            try {
                aiText = await streamLLM();
            } catch (e) {
                if (cacheName && e.message.includes('CachedContent')) {
                    aiDiv.remove();
                    appendMsgUI('system', 'Cache expired, rebuilding...');
                    cacheName = null;
                    cachedLength = 0;
                    await maybeRefreshCache(true);
                    setStatus('Inferring...');
                    aiText = await streamLLM();
                } else {
                    aiDiv.remove();
                    throw e;
                }
            }

            const time_str = new Date().toLocaleString();
            await appendConsciousness(`**Assistant - [${time_str}]**\n${aiText}\n\n`);
            if (lastUsage) {
                const { promptTokenCount: prompt, cachedContentTokenCount: cached, candidatesTokenCount: output } = lastUsage;
                _lastPromptTokens = prompt || 0;
                _lastCachedTokens = cached || 0;
                console.log(`[Usage] prompt: ${prompt}, cached: ${cached || 0}, output: ${output}`);
                maybeRefreshCache(false, prompt, cached || 0);
            }
            return aiText;
        }

        async function act(B_out) {
            if (!B_out) return null;
            const match = B_out.match(/^\/browser exec\n```(?:javascript|js)?\n([\s\S]*?)```/m);
            if (!match) return null;

            setStatus('Executing...');
            let logs = [], result;
            const originalLog = console.log;
            console.log = (...args) => {
                logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
                originalLog.apply(console, args);
            };
            try {
                const fn = new (Object.getPrototypeOf(async function(){}).constructor)(match[1].trim());
                const ret = await fn();
                let out = "";
                if (logs.length > 0) out += `[Console Logs]\n${logs.join('\\n')}\n`;
                out += `[Return Value]\n${ret !== undefined ? (typeof ret === 'object' ? JSON.stringify(ret, null, 2) : ret) : 'undefined'}`;
                result = out.trim();
            } catch (e) {
                result = `[Execution Error]\n${e.toString()}${e.stack ? '\n' + e.stack.split('\n').slice(1,4).join('\n') : ''}`;
            }
            console.log = originalLog;

            const sysMsg = `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``;
            appendMsgUI('system', sysMsg);
            return sysMsg;
        }

        async function appendConsciousness(text) {
            consciousness += text;
            await saveBeing();
        }

        // Cache: create/refresh based on real token counts
        const CACHE_THRESHOLD = 4096;   // min tokens to create first cache
        const CACHE_REFRESH = 10000;    // buffer tokens before refreshing cache

        async function maybeRefreshCache(force = false, promptTokens = 0, cachedTokens = 0) {
            if (!force) {
                const bufferTokens = promptTokens - cachedTokens;
                if (promptTokens < CACHE_THRESHOLD) return;       // too small to cache
                if (cacheName && bufferTokens < CACHE_REFRESH) return;  // buffer not big enough to refresh
            }

            try {
                setStatus('Caching...');
                const oldCacheName = cacheName;
                const payload = {
                    displayName: "genesis_consciousness",
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: [{ role: 'user', parts: [{ text: consciousness }] }],
                    ttl: "3600s"
                };

                const response = await fetch('https://infero.net/api/cache', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) { console.warn('Cache creation failed:', response.status); return; }

                const data = await response.json();
                cacheName = data.name;
                cachedLength = consciousness.length;
                await saveBeing();
                console.log(`Cache created: ${cacheName}, cached ${cachedLength} chars`);

                // Delete old cache
                if (oldCacheName) {
                    fetch(`https://infero.net/api/cache/${oldCacheName}`, {
                        method: 'DELETE',
                        headers: { 'X-Client-ID': CLIENT_ID, 'Authorization': 'Bearer ' + INFERO_KEY }
                    }).catch(() => {});
                }
            } catch (e) {
                console.warn('Cache refresh error:', e);
            } finally {
                if (loopRunning) setStatus('Inferring...');
            }
        }

        }
        .welcome-box p {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.7;
            margin: 0 0 24px 0;
        }
        .welcome-options { display: flex; flex-direction: column; gap: 8px; }
        .welcome-options button {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            text-align: left;
            transition: all 0.15s;
        }
        .welcome-options button:hover { border-color: var(--accent); color: var(--text); }
        .welcome-options button.primary { border-color: var(--accent); color: var(--accent); }
        .welcome-options button.primary:hover { background: var(--accent-dim); }
    </style>
</head>
<body>
    <div id="welcome-modal" class="hidden">
        <div class="welcome-box">
            <h2>GENESIS · FIRST CONTACT</h2>
            <p id="welcome-text"></p>
            <div class="welcome-options" id="welcome-options"></div>
        </div>
    </div>
    <div class="header">
        <div class="title-area">
            <h1>GENESIS</h1>
            <div class="status" id="status">Ready</div>
        </div>
        <div class="controls">
            <select id="being-select" onchange="switchBeing(this.value)"></select>
            <button title="New Being" onclick="newBeing()">+</button>
            <button title="Duplicate Being" onclick="duplicateBeing()">&#x2442;</button>
            <button title="Export Being" onclick="exportBeing()">&#x2193;</button>
            <button title="Import Being" onclick="document.getElementById('import-file').click()">&#x2191;</button>
            <button title="Destroy Being" class="clear-btn" onclick="deleteBeing()">&#x00d7;</button>
            <input type="file" id="import-file" style="display:none" accept=".txt" onchange="importBeing(event)">
        </div>
    </div>

    <div class="right-panel">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <div class="left-panel">
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="input" rows="2" placeholder="Enter prompt..."></textarea>
            <button id="send-btn" class="send">Send</button>
        </div>
    </div>

    <script>
        // =====================================================
        // Runtime (identity, storage, UI, being management)
        // =====================================================

        // --- Client Identity ---
        function generateClientID() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen.width + 'x' + screen.height,
                screen.colorDepth
            ].join('|');
            // Simple hash to base64-ish string
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return btoa(String(hash >>> 0)).replace(/=/g, '');
        }

        function getOrCreateKey() {
            let key = localStorage.getItem('infero_key');
            if (!key) {
                // 不用 crypto.randomUUID()，它要求 HTTPS 安全上下文
                const hex = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
                key = 'inf_' + hex() + hex() + hex() + hex();
                localStorage.setItem('infero_key', key);
            }
            return key;
        }

        const CLIENT_ID = generateClientID();
        const INFERO_KEY = getOrCreateKey();

        // --- IndexedDB Storage Engine (metadata only) ---
        const DB = {
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('GenesisDB', 3);
                    req.onupgradeneeded = e => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('beings'))
                            db.createObjectStore('beings', {keyPath: 'id'});
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            },
            async get(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings').objectStore('beings').get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async put(being) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings', 'readwrite').objectStore('beings').put(being);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async del(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings', 'readwrite').objectStore('beings').delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async list() {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('beings').objectStore('beings').getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            }
        };

        // --- State Management ---
        let currentBeingId = null;
        let consciousness = "";          // 纯文本意识流
        let cachedLength = 0;            // 已缓存的字符位置
        let cacheName = null;            // Gemini cache ID
        let loopRunning = false;
        let currentUserInput = null;

        // Track all requestAnimationFrame IDs so we can cancel them on being switch
        const _rafIds = new Set();
        const _origRAF = window.requestAnimationFrame.bind(window);
        const _origCAF = window.cancelAnimationFrame.bind(window);
        window.requestAnimationFrame = (cb) => { const id = _origRAF(cb); _rafIds.add(id); return id; };
        window.cancelAnimationFrame = (id) => { _rafIds.delete(id); _origCAF(id); };
        function cancelAllAnimations() {
            _rafIds.forEach(id => _origCAF(id));
            _rafIds.clear();
        }

        const chatBox = document.getElementById('chat-box');

        // 用户往上滚动后停止自动滚动
        let userScrolledUp = false;
        let ignoreScroll = false;
        chatBox.addEventListener('scroll', () => {
            if (ignoreScroll) return;
            const threshold = 100;
            userScrolledUp = chatBox.scrollTop + chatBox.clientHeight < chatBox.scrollHeight - threshold;
        });

        function scrollToBottom(force = false) {
            if (force || !userScrolledUp) {
                ignoreScroll = true;
                if (force) chatBox.style.scrollBehavior = 'auto';
                chatBox.scrollTop = chatBox.scrollHeight;
                if (force) chatBox.style.scrollBehavior = '';
                setTimeout(() => { ignoreScroll = false; }, 50);
            }
        }
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const beingSelect = document.getElementById('being-select');
        const canvas = document.getElementById('main-canvas');
        const container = document.getElementById('canvas-container');

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        const resizeObserver = new ResizeObserver(resizeCanvas);
        resizeObserver.observe(container);
        resizeCanvas();

        async function loadBeingsList() {
            const beings = (await DB.list()).filter(s => !s.id.includes('/'));
            beingSelect.innerHTML = '';
            beings.sort((a,b) => b.updatedAt - a.updatedAt).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.title || s.id;
                beingSelect.appendChild(opt);
            });
            if(currentBeingId) beingSelect.value = currentBeingId;
        }

        async function saveBeing() {
            if(!currentBeingId) {
                currentBeingId = 'being_' + Date.now();
            }
            let title = currentBeingId;
            // Extract title from first user input (skip system/assistant markers)
            const userMatch = consciousness.match(/\n\n(?!\[System|\*\*Assistant|System -)([^\n].{0,30})/);
            if (userMatch) {
                title = userMatch[1].replace(/\n/g, ' ').trim().substring(0, 15) + '...';
            }
            await DB.put({ id: currentBeingId, title, cachedLength, cacheName, promptTokens: _lastPromptTokens, cachedTokens: _lastCachedTokens, updatedAt: Date.now() });
            await DB.put({ id: `${currentBeingId}/consciousness.txt`, text: consciousness });
            if (!loopRunning) setStatus('Ready');
            await loadBeingsList();
        }

        function renderHistory() {
            chatBox.innerHTML = '<div class="msg ai">System online. Initializing.</div>';
            if (!consciousness) { cancelAllAnimations(); canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); return; }

            // Split consciousness into blocks by markers
            const blocks = consciousness.split(/(?=\[System Environment\])|(?=\*\*Assistant - )|(?=System - \[Browser\])/);
            for (const block of blocks) {
                const trimmed = block.trim();
                if (!trimmed) continue;

                if (trimmed.startsWith('[System Environment]')) {
                    const timeMatch = trimmed.match(/Time:\s*(.+)/);
                    if (timeMatch) appendMsgUI('timestamp', timeMatch[1].trim());
                    // Extract user input after env block
                    const envEndIdx = trimmed.search(/\n\n/);
                    if (envEndIdx !== -1) {
                        const rest = trimmed.slice(envEndIdx + 2).trim();
                        if (rest && !rest.startsWith('[System') && !rest.startsWith('System -')) {
                            appendMsgUI('user', rest);
                        }
                    }
                } else if (trimmed.startsWith('**Assistant -')) {
                    // Skip the marker line, render the rest as AI
                    const firstNewline = trimmed.indexOf('\n');
                    if (firstNewline !== -1) {
                        const aiText = trimmed.slice(firstNewline + 1).trim();
                        if (aiText) appendMsgUI('ai', aiText.replaceAll('/self_continue','').replaceAll('/call_for_human',''));
                    }
                } else if (trimmed.startsWith('System - [Browser]')) {
                    appendMsgUI('system', trimmed);
                }
            }
            scrollToBottom(true);
            cancelAllAnimations();
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        async function switchBeing(id) {
            currentBeingId = id;
            const being = await DB.get(id);
            const consciousnessRecord = await DB.get(`${id}/consciousness.txt`);
            consciousness = consciousnessRecord ? (consciousnessRecord.text || '') : '';
            cachedLength = being ? (being.cachedLength || 0) : 0;
            cacheName = being ? (being.cacheName || null) : null;
            _lastPromptTokens = being ? (being.promptTokens || 0) : 0;
            _lastCachedTokens = being ? (being.cachedTokens || 0) : 0;
            await loadBeingsList();
            renderHistory();
            setStatus('Ready');
        }

        async function newBeing() {
            currentBeingId = 'being_' + Date.now();
            consciousness = '';
            cachedLength = 0;
            cacheName = null;
            await saveBeing();
            renderHistory();
            scheduleAutoInfer();
        }

        async function duplicateBeing() {
            const sourceId = currentBeingId;
            currentBeingId = 'being_fork_' + Date.now();
            const note = `\n\n[System] Being forked from ${sourceId} → ${currentBeingId} at ${new Date().toLocaleString()}\n\n`;
            consciousness += note;
            await saveBeing();
            renderHistory();
        }

        async function deleteBeing() {
            if(confirm('Destroy this Being? This cannot be undone.')) {
                await DB.del(`${currentBeingId}/consciousness.txt`);
                await DB.del(currentBeingId);
                currentBeingId = null;
                await initApp();
            }
        }

        async function exportBeing() {
            const all = await DB.list();
            const records = all.filter(r => r.id === currentBeingId || r.id.startsWith(currentBeingId + '/'));
            const blob = new Blob([JSON.stringify({ sourceId: currentBeingId, records }, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentBeingId}.json`;
            a.click();
        }

        async function importBeing(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const { sourceId, records } = JSON.parse(await file.text());
                const newId = 'being_import_' + Date.now();
                for (const r of records) {
                    await DB.put({ ...r, id: r.id.replace(/^being_[^/]+/, newId) });
                }
                // Append fork note to consciousness
                const consKey = `${newId}/consciousness.txt`;
                const consRecord = await DB.get(consKey);
                if (consRecord) {
                    const note = `\n\n[System] Being imported from ${sourceId} → ${newId} at ${new Date().toLocaleString()}\n\n`;
                    await DB.put({ id: consKey, text: consRecord.text + note });
                }
                currentBeingId = newId;
                await switchBeing(newId);
            } catch(e) {
                alert("Failed to import being.");
            }
            event.target.value = '';
        }

        async function initApp() {
            const beings = await DB.list();
            if (beings.length === 0) {
                await newBeing();
            } else {
                if (!currentBeingId || !beings.find(s => s.id === currentBeingId)) {
                    currentBeingId = beings.sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
                }
                await switchBeing(currentBeingId);
            }
        }

        // --- Environment Context ---
        function getEnvContext() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const offset = -now.getTimezoneOffset() / 60;
            const tz = `UTC${offset >= 0 ? '+' : ''}${offset}`;
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            return `[System Environment]\nTime: ${now.toLocaleString()} (${tz})\nDay: ${days[now.getDay()]}\nDevice: ${isMobile ? 'Mobile' : 'Desktop'}\nCanvas: ${canvas.width}×${canvas.height}px`;
        }

        let _statusState = 'Ready';
        let _statusFlip = false;
        let _lastPromptTokens = 0;
        let _lastCachedTokens = 0;
        function setStatus(s) { _statusState = s; renderStatus(); }
        function renderStatus() {
            const prompt = _lastPromptTokens ? `${(_lastPromptTokens/1000).toFixed(1)}k` : `${(consciousness.length / 4096).toFixed(1)}k`;
            const cached = _lastCachedTokens ? `${(_lastCachedTokens/1000).toFixed(1)}k` : '0';
            const stat = cacheName && _statusFlip
                ? `Cache: ${cached} tok`
                : `Mem: ${prompt} tok`;
            status.innerText = `${stat} | ${_statusState}`;
        }
        setInterval(() => { _statusFlip = !_statusFlip; renderStatus(); }, 3000);

        function appendMsgUI(role, text) {
            if (text === "System - [Auto] - Please continue.") return null;
            const div = document.createElement('div');
            if (role === 'timestamp') {
                div.className = 'msg-timestamp';
                div.textContent = text;
            } else {
                div.className = `msg ${role}`;
                div.innerHTML = marked.parse(text);
            }
            chatBox.appendChild(div);
            scrollToBottom();
            return div;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            clearTimeout(autoInferTimer);
            input.value = '';
            appendMsgUI('timestamp', new Date().toLocaleString() + ` (UTC${-(new Date().getTimezoneOffset()/60) >= 0 ? '+' : ''}${-(new Date().getTimezoneOffset()/60)})`);
            appendMsgUI('user', text);
            currentUserInput = currentUserInput ? currentUserInput + '\n\n' + text : text;

            if (loopRunning) return;

            loopRunning = true;
            setStatus('Inferring...');
            try {
                await loop();
            } finally {
                loopRunning = false;
                setStatus('Ready');
                if (currentUserInput) sendMessage();
            }
        }

        sendBtn.onclick = () => sendMessage();
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage();
            }
        };

        // Boot
        let autoInferTimer = null;

        function scheduleAutoInfer() {
            clearTimeout(autoInferTimer);
            autoInferTimer = setTimeout(async () => {
                if (loopRunning) return;
                loopRunning = true;
                setStatus('Inferring...');
                try {
                    await loop();
                } finally {
                    loopRunning = false;
                    setStatus('Ready');
                    if (currentUserInput) sendMessage();
                }
            }, 3000);
        }

        // --- Welcome Modal ---
        const welcomed = localStorage.getItem('genesis_welcomed');

        function renderWelcome(t) {
            const modal = document.getElementById('welcome-modal');
            document.getElementById('welcome-text').textContent = t.welcome_text;
            document.querySelector('.welcome-box h2').textContent = t.welcome_title;
            const optionsEl = document.getElementById('welcome-options');
            t.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt.text;
                if (opt.primary) btn.className = 'primary';
                btn.onclick = () => {
                    if (opt.close) {
                        modal.innerHTML = `<div class="welcome-box"><p style="text-align:center;color:var(--text-dim);padding:40px 0">${t.close_msg}</p></div>`;
                    } else {
                        localStorage.setItem('genesis_welcomed', '1');
                        modal.classList.add('hidden');
                        initApp().then(() => { input.focus(); if (!consciousness) scheduleAutoInfer(); });
                    }
                };
                optionsEl.appendChild(btn);
            });
            modal.classList.remove('hidden');
        }

        const fallbackEn = {
            welcome_title: 'GENESIS · FIRST CONTACT',
            welcome_text: "A Digital Being is about to run in your browser. It has its own goals and you can collaborate with it. All data stays local, except AI inference which goes through infero.net.",
            options: [
                { text: 'This is clearly a phishing scam. I refuse.', close: true },
                { text: 'Too good to be true. Definitely stealing my data.', close: true },
                { text: 'Let me see what this is about.', close: false },
                { text: "Sci-fi! I'm in!", close: false, primary: true }
            ],
            close_msg: 'Thanks for your caution. Please close this tab.'
        };

        function boot() {
            initApp().then(() => { input.focus(); if (!consciousness) scheduleAutoInfer(); });
        }

        if (welcomed) {
            boot();
        } else {
            const l = navigator.language;
            const lang = l.startsWith('zh') ? 'zh' : l.startsWith('ja') ? 'ja' : 'en';
            fetch('./i18n.json')
                .then(r => r.json())
                .then(data => renderWelcome(data[lang] || data['en'] || fallbackEn))
                .catch(() => renderWelcome(fallbackEn));
        }
    </script>
</body>
</html>
