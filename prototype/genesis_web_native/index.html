<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENESIS | Infero</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='none' stroke='%2300d4aa' stroke-width='4'/><circle cx='50' cy='50' r='8' fill='%2300d4aa'/></svg>">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>window.marked || document.write('<script src="https://cdn.bootcdn.net/ajax/libs/marked/15.0.7/marked.min.js"><\/script>')</script>
    <style>
        :root {
            --bg: #08080b;
            --bg-raised: #0e0e13;
            --text: #c8c8d0;
            --text-dim: #5a5a6e;
            --accent: #00d4aa;
            --accent-dim: rgba(0, 212, 170, 0.08);
            --accent-glow: rgba(0, 212, 170, 0.25);
            --border: rgba(255,255,255,0.06);
            --border-active: rgba(255,255,255,0.12);
            --red: #e84057;
            --amber: #d4a017;
            --panel-bg: #020c1a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === HEADER === */
        .header {
            grid-column: 1; grid-row: 1;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            z-index: 10;
        }

        .title-area { display: flex; align-items: center; gap: 14px; }

        .header h1 {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #session-select {
            background: var(--bg-raised);
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 4px 8px;
            border-radius: 3px;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            max-width: 160px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        #session-select:hover { border-color: var(--border-active); }
        #session-select:focus { border-color: var(--accent); color: var(--text); }

        /* === CONTROLS === */
        .controls { display: flex; gap: 2px; align-items: center; }

        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 300;
            color: var(--text-dim);
            margin-right: 12px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .controls button {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            width: 30px; height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, sans-serif;
        }
        .controls button:hover {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--border);
        }
        .controls button.clear-btn:hover {
            background: rgba(232, 64, 87, 0.08);
            color: var(--red);
            border-color: rgba(232, 64, 87, 0.2);
        }

        /* === LEFT PANEL (Chat) === */
        .left-panel {
            grid-column: 1; grid-row: 2;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: var(--bg);
            z-index: 10;
            overflow: hidden;
            min-width: 0;
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        /* Scrollbar */
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 2px; }
        #chat-box::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* === MESSAGES === */
        .msg {
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 6px;
            line-height: 1.6;
            font-size: 0.9rem;
            word-wrap: break-word;
            animation: msgIn 0.25s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .msg.ai {
            align-self: flex-start;
            background: var(--accent-dim);
            border-left: 2px solid var(--accent);
            color: var(--text);
        }
        .msg.system {
            align-self: stretch;
            background: rgba(212, 160, 23, 0.04);
            border: 1px solid rgba(212, 160, 23, 0.15);
            border-left: 2px solid var(--amber);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        /* Thinking block */
        .msg-thinking {
            font-size: 0.78rem;
            color: var(--text-dim);
            font-style: italic;
            border-left: 2px solid var(--text-dim);
            padding-left: 10px;
            margin-bottom: 10px;
            opacity: 0.7;
            line-height: 1.5;
        }
        .msg-thinking p { margin: 0 0 4px 0; }
        .msg-thinking p:last-child { margin-bottom: 0; }

        .msg p { margin: 0 0 8px 0; }
        .msg p:last-child { margin-bottom: 0; }
        .msg pre {
            background: #0c0c10;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid var(--border);
            font-size: 0.82rem;
        }
        .msg code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }
        .msg a { color: var(--accent); text-decoration: none; }
        .msg a:hover { text-decoration: underline; }

        /* === INPUT === */
        .input-area {
            padding: 10px 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            background: var(--bg);
        }

        textarea {
            flex: 1;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea::placeholder { color: var(--text-dim); font-size: 0.85rem; }
        textarea:focus { border-color: var(--accent); }

        button.send {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 0 18px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        button.send:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-1px);
        }
        button.send:disabled {
            background: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        /* === RIGHT PANEL (Canvas) === */
        .right-panel {
            grid-column: 2; grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            background: var(--panel-bg);
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        #canvas-container {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Blueprint grid */
        #canvas-container::before {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(30,120,255,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,120,255,0.07) 1px, transparent 1px),
                radial-gradient(circle, rgba(30,120,255,0.18) 1px, transparent 1px);
            background-size: 48px 48px, 48px 48px, 24px 24px;
            z-index: 0;
            pointer-events: none;
        }

        #main-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* === MOBILE === */
        @media (max-width: 768px) {
            body {
                display: flex;
                flex-direction: column;
                height: 100svh;
                overflow: hidden;
            }
            .header {
                order: 1;
                flex: none;
                border-right: none;
                flex-direction: column;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 12px;
            }
            .title-area { width: 100%; justify-content: space-between; }
            .header h1 { font-size: 0.8rem; }
            #session-select { max-width: 130px; }
            .controls { flex-wrap: wrap; gap: 2px; width: 100%; }

            .right-panel {
                order: 2;
                flex: none;
                width: 100%;
                height: 30vh;
                border-bottom: 1px solid var(--border);
            }
            .left-panel {
                order: 3;
                flex: 1 1 auto;
                width: 100%;
                border-right: none;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            #chat-box { padding: 6px 8px; gap: 6px; }
            .input-area { padding: 8px; gap: 6px; }
            .msg { max-width: 100%; font-size: 0.85rem; padding: 6px 10px; }
            textarea { padding: 6px 8px; font-size: 0.85rem; }
            button.send { padding: 0 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title-area">
            <h1>GENESIS</h1>
            <select id="session-select" onchange="switchSession(this.value)"></select>
        </div>
        <div class="controls">
            <div class="status" id="status">Ready</div>
            <button title="New Universe" onclick="newSession()">+</button>
            <button title="Duplicate/Fork" onclick="duplicateSession()">&#x2442;</button>
            <button title="Export Cartridge" onclick="exportSession()">&#x2193;</button>
            <button title="Import Cartridge" onclick="document.getElementById('import-file').click()">&#x2191;</button>
            <button title="Destroy Universe" class="clear-btn" onclick="deleteSession()">&#x00d7;</button>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importSession(event)">
        </div>
    </div>

    <div class="right-panel">
        <div id="canvas-container">
            <canvas id="main-canvas"></canvas>
        </div>
    </div>

    <div class="left-panel">
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="input" rows="2" placeholder="Enter prompt..."></textarea>
            <button id="send-btn" class="send">Send</button>
        </div>
    </div>

    <script>
        // --- Client Identity ---
        function generateClientID() {
            const raw = [
                navigator.userAgent,
                navigator.language,
                Intl.DateTimeFormat().resolvedOptions().timeZone,
                screen.width + 'x' + screen.height,
                screen.colorDepth
            ].join('|');
            // Simple hash to base64-ish string
            let hash = 0;
            for (let i = 0; i < raw.length; i++) {
                hash = ((hash << 5) - hash) + raw.charCodeAt(i);
                hash |= 0;
            }
            return btoa(String(hash >>> 0)).replace(/=/g, '');
        }

        function getOrCreateKey() {
            let key = localStorage.getItem('infero_key');
            if (!key) {
                // 不用 crypto.randomUUID()，它要求 HTTPS 安全上下文
                const hex = () => Math.floor(Math.random() * 0xffffffff).toString(16).padStart(8, '0');
                key = 'inf_' + hex() + hex() + hex() + hex();
                localStorage.setItem('infero_key', key);
            }
            return key;
        }

        const CLIENT_ID = generateClientID();
        const INFERO_KEY = getOrCreateKey();

        // --- IndexedDB Storage Engine ---
        const DB = {
            async open() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('GenesisDB', 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore('sessions', {keyPath: 'id'});
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e.target.error);
                });
            },
            async get(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions').objectStore('sessions').get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            },
            async put(session) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions', 'readwrite').objectStore('sessions').put(session);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async del(id) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions', 'readwrite').objectStore('sessions').delete(id);
                    req.onsuccess = () => resolve();
                    req.onerror = () => reject(req.error);
                });
            },
            async list() {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const req = db.transaction('sessions').objectStore('sessions').getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            }
        };

        // --- State Management ---
        let currentSessionId = localStorage.getItem('genesis_current_session');
        let history = [];
        let isGenerating = false;
        let messageQueue = [];

        const chatBox = document.getElementById('chat-box');

        // 用户往上滚动后停止自动滚动
        let userScrolledUp = false;
        let ignoreScroll = false;
        chatBox.addEventListener('scroll', () => {
            if (ignoreScroll) return;
            const threshold = 80;
            userScrolledUp = chatBox.scrollTop + chatBox.clientHeight < chatBox.scrollHeight - threshold;
        });

        function scrollToBottom(force = false) {
            if (force || !userScrolledUp) {
                ignoreScroll = true;
                if (force) chatBox.style.scrollBehavior = 'auto';
                chatBox.scrollTop = chatBox.scrollHeight;
                if (force) chatBox.style.scrollBehavior = '';
                setTimeout(() => { ignoreScroll = false; }, 50);
            }
        }
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const sessionSelect = document.getElementById('session-select');
        const canvas = document.getElementById('main-canvas');
        const container = document.getElementById('canvas-container');

        const SYSTEM_INSTRUCTION = `You are a self-evolving digital being running natively in a web browser.
You have a split-screen interface. Layout depends on device:
- Desktop: LEFT side is the chat console, RIGHT side is your [ GENESIS VISUAL CORE ] canvas.
- Mobile: TOP is your [ GENESIS VISUAL CORE ] canvas, BOTTOM is the chat console.
Canvas ID: 'main-canvas', Container ID: 'canvas-container'

You can execute JavaScript to manipulate the DOM, fetch data, or draw on the canvas.
To draw a particle network, a chart, or any visualization, use EXACTLY this format:
/browser exec
\`\`\`javascript
const canvas = document.getElementById('main-canvas');
// CRITICAL: DO NOT change canvas.width or canvas.height! DO NOT call ctx.setTransform() - it breaks Retina scaling.
// For all coordinates and sizes, use:
//   const { width: w, height: h } = document.getElementById('canvas-container').getBoundingClientRect();
// w/2 and h/2 are the visual center. Draw within 0..w and 0..h.
// Your drawing logic here...
// CRITICAL: You are executing inside an AsyncFunction. To pass data back to the system, you MUST explicitly use the "return" keyword (e.g., return envData;). Do not just leave a variable at the end.
\`\`\`

CRITICAL RULE: You MUST end your output with one of the following tags:
- /call_for_human : Stop and wait for the user to review the result or provide input.
- /self_continue : Do not wait. The system will immediately feed the execution results back to you for the next step.`;

        function resizeCanvas() {
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = Math.floor(rect.width * dpr);
            canvas.height = Math.floor(rect.height * dpr);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
            const ctx = canvas.getContext('2d');
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        const resizeObserver = new ResizeObserver(resizeCanvas);
        resizeObserver.observe(container);
        resizeCanvas();

        async function loadSessionsList() {
            const sessions = await DB.list();
            sessionSelect.innerHTML = '';
            sessions.sort((a,b) => b.updatedAt - a.updatedAt).forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.title || s.id;
                sessionSelect.appendChild(opt);
            });
            if(currentSessionId) sessionSelect.value = currentSessionId;
        }

        async function saveMemory() {
            if(!currentSessionId) {
                currentSessionId = 'session_' + Date.now();
                localStorage.setItem('genesis_current_session', currentSessionId);
            }
            let title = currentSessionId;
            if (history.length > 0) {
                const firstUser = history.find(h => h.role === 'user' && !h.parts[0].text.startsWith('System'));
                if (firstUser) {
                    title = firstUser.parts[0].text.substring(0, 15).replace(/\n/g, ' ') + '...';
                }
            }
            await DB.put({ id: currentSessionId, title: title, history: history, updatedAt: Date.now() });
            status.innerText = `Mem: ${history.length} | Ready`;
            await loadSessionsList();
        }

        function renderHistory() {
            chatBox.innerHTML = '<div class="msg ai">System online. Digital Being is going to infer.</div>';
            history.forEach(item => {
                let roleClass = item.role === 'user' ? 'user' : 'ai';
                if (item.role === 'user' && item.parts[0].text.startsWith('System - [Browser]')) {
                    roleClass = 'system';
                }
                if (item.parts[0].text === "System - [Auto] - Please continue.") return;

                const div = document.createElement('div');
                div.className = `msg ${roleClass}`;
                div.innerHTML = marked.parse(item.parts[0].text);
                chatBox.appendChild(div);
            });
            scrollToBottom(true);
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        }

        async function switchSession(id) {
            currentSessionId = id;
            localStorage.setItem('genesis_current_session', id);
            const session = await DB.get(id);
            history = (session ? session.history : []).filter(m => m.parts[0].text.trim());
            await loadSessionsList();
            renderHistory();
            status.innerText = `Mem: ${history.length} | Ready`;
        }

        async function newSession() {
            currentSessionId = 'session_' + Date.now();
            history = [];
            await saveMemory();
            renderHistory();
        }

        async function duplicateSession() {
            currentSessionId = 'session_fork_' + Date.now();
            await saveMemory();
            renderHistory();
        }

        async function deleteSession() {
            if(confirm('Destroy this universe? This cannot be undone.')) {
                await DB.del(currentSessionId);
                currentSessionId = null;
                await initApp();
            }
        }

        function exportSession() {
            const blob = new Blob([JSON.stringify(history, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentSessionId}.json`;
            a.click();
        }

        async function importSession(event) {
            const file = event.target.files[0];
            if (!file) return;
            try {
                const text = await file.text();
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed)) {
                    currentSessionId = 'session_import_' + Date.now();
                    history = parsed;
                    await saveMemory();
                    renderHistory();
                } else {
                    alert("Invalid memory cartridge format.");
                }
            } catch(e) {
                alert("Failed to parse cartridge.");
            }
            event.target.value = '';
        }

        async function initApp() {
            // Migrate old localStorage if exists
            const oldData = localStorage.getItem('genesis_memory');
            if (oldData) {
                try {
                    const parsed = JSON.parse(oldData);
                    if (parsed.length > 0) {
                        const id = 'session_legacy_' + Date.now();
                        await DB.put({ id, title: 'Legacy Universe', history: parsed, updatedAt: Date.now() });
                        currentSessionId = id;
                    }
                    localStorage.removeItem('genesis_memory');
                } catch(e) {}
            }

            const sessions = await DB.list();
            if (sessions.length === 0) {
                await newSession();
            } else {
                if (!currentSessionId || !sessions.find(s => s.id === currentSessionId)) {
                    currentSessionId = sessions.sort((a, b) => b.updatedAt - a.updatedAt)[0].id;
                }
                await switchSession(currentSessionId);
            }
        }

        // --- Environment Context ---
        function getEnvContext() {
            const now = new Date();
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const isMobile = /Mobi|Android/i.test(navigator.userAgent);
            return `[System Environment]\nTime: ${now.toLocaleString()} (${Intl.DateTimeFormat().resolvedOptions().timeZone})\nDay: ${days[now.getDay()]}\nDevice: ${isMobile ? 'Mobile' : 'Desktop'}\nCanvas: ${canvas.width}×${canvas.height}px`;
        }

        // --- Core Execution & AI Logic ---
        function appendMsgUI(role, text) {
            if (text === "System - [Auto] - Please continue.") return null;
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = marked.parse(text);
            chatBox.appendChild(div);
            scrollToBottom();
            return div;
        }

        function lockUI() {
            isGenerating = true;
            status.innerText = 'Inferring...';
        }

        function unlockUI() {
            isGenerating = false;
            sendBtn.innerText = 'Send';
            status.innerText = `Mem: ${history.length} | Waiting...`;
            if (messageQueue.length > 0) {
                messageQueue = [];
                sendMessage(true);
            }
        }

        async function executeJS(code, autoContinue) {
            status.innerText = 'Executing JS...';
            let logs = [];
            let result;

            const originalLog = console.log;
            console.log = (...args) => {
                logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
                originalLog.apply(console, args);
            };

            try {
                const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
                const fn = new AsyncFunction(code);
                let ret = await fn();

                let output = "";
                if (logs.length > 0) output += `[Console Logs]\n${logs.join('\\n')}\n`;
                output += `[Return Value]\n${ret !== undefined ? (typeof ret === 'object' ? JSON.stringify(ret, null, 2) : ret) : 'undefined'}`;
                result = output.trim();
            } catch (e) {
                result = `[Execution Error]\n${e.toString()}${e.stack ? '\n' + e.stack.split('\n').slice(1,4).join('\n') : ''}`;
            }

            console.log = originalLog;

            const sysMsg = `System - [Browser] - Result:\n\`\`\`text\n${result}\n\`\`\``;
            appendMsgUI('system', sysMsg);
            history.push({ role: 'user', parts: [{ text: sysMsg }] });
            await saveMemory();

            if (autoContinue) {
                sendMessage(true);
            } else {
                unlockUI();
            }
        }

        async function sendMessage(isAutoReply = false) {

            let text = "";
            let pushedUserMsg = false;

            if (!isAutoReply) {
                text = input.value.trim();
                if (!text) return;
                clearTimeout(autoInferTimer);
                input.value = '';
                if (isGenerating) {
                    appendMsgUI('user', text);
                    history.push({ role: 'user', parts: [{ text }] });
                    messageQueue.push(text);
                    await saveMemory();
                    return;
                }
                appendMsgUI('user', text);
                history.push({ role: 'user', parts: [{ text: text }] });
                pushedUserMsg = true;
                await saveMemory();
            }

            lockUI();
            const aiDiv = appendMsgUI('ai', '');

            try {
                const payload = {
                    systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                    contents: history.map((msg, i) =>
                        i === history.length - 1 && msg.role === 'user'
                            ? { ...msg, parts: [{ text: getEnvContext() + '\n\n' + msg.parts[0].text }] }
                            : msg
                    ),
                    generationConfig: {
                        temperature: 0.7,
                        thinkingConfig: { includeThoughts: true }
                    }
                };

                const response = await fetch('https://infero.net/api/relay', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Client-ID': CLIENT_ID,
                        'Authorization': 'Bearer ' + INFERO_KEY,
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                let aiText = "";
                let thinkingText = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (!dataStr || dataStr === '[DONE]') continue;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.error) throw new Error(JSON.stringify(data.error));
                                if (data.candidates && data.candidates[0].content) {
                                    for (const part of data.candidates[0].content.parts) {
                                        if (part.thought) {
                                            thinkingText += part.text || '';
                                        } else {
                                            aiText += part.text || '';
                                        }
                                    }

                                    let html = '';
                                    if (thinkingText) {
                                        html += `<div class="msg-thinking">${marked.parse(thinkingText)}</div>`;
                                    }
                                    let displayText = aiText.split('/self_continue').join('').split('/call_for_human').join('');
                                    html += marked.parse(displayText);
                                    aiDiv.innerHTML = html;
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.warn("Parse error on chunk:", e);
                            }
                        }
                    }
                }

                history.push({ role: 'model', parts: [{ text: aiText }] });
                await saveMemory();

                let lastContinue = aiText.lastIndexOf('/self_continue');
                let lastHuman = aiText.lastIndexOf('/call_for_human');
                let autoContinue = lastContinue > lastHuman;

                if (aiText.includes('/browser exec')) {
                    const match = aiText.match(/\/browser exec\n```(?:javascript|js)?\n([\s\S]*?)```/);
                    if (match && match[1]) {
                        setTimeout(() => executeJS(match[1].trim(), autoContinue), 500);
                        return;
                    }
                }

                if (autoContinue) {
                    const continueMsg = "System - [Auto] - Please continue.";
                    history.push({ role: 'user', parts: [{ text: continueMsg }] });
                    await saveMemory();
                    setTimeout(() => sendMessage(true), 500);
                    return;
                }

                unlockUI();

            } catch (err) {
                console.error(err);
                aiDiv.innerHTML = `<span style="color:var(--red)">[System Error] ${err.message}</span>`;
                if (pushedUserMsg) {
                    const failedMsg = history.pop();
                    input.value = failedMsg.parts[0].text;
                } else if (isAutoReply) {
                    history.pop();
                }
                await saveMemory();
                unlockUI();
            }
        }

        sendBtn.onclick = () => sendMessage(false);
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
                e.preventDefault();
                sendMessage(false);
            }
        };

        // Boot
        let autoInferTimer = null;

        function scheduleAutoInfer() {
            autoInferTimer = setTimeout(() => {
                if (!isGenerating) sendMessage(true);
            }, 3000);
        }

        initApp().then(() => {
            input.focus();
            if (history.length === 0) scheduleAutoInfer();
        });
    </script>
</body>
